name: CI

on:
  push:
    branches: [main, fix/round1.1-rc2-hardening]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pip install pytest-randomly
      - run: ruff check .
      - run: python -m mypy src
      - run: pytest -q -m "not live_deepseek" --randomly-seed=1
      - run: python -c "
        from evidence_agent.database.migrations import check;
        r = check();
        assert r['integrity'] == 'ok';
        assert r['version'] >= 5;
        print(f'DB check OK: version={r[\"version\"]}')
        "
