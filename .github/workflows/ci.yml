name: CI

on:
  push:
    branches: [main, fix/round1.1-rc2-hardening]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: python -m mypy src
      - run: pytest -q -m "not live_deepseek"
      - run: python -c "
        from tests.golden.golden_loader import load_golden;
        from tests.golden.evaluator import evaluate_golden;
        g = load_golden();
        r = evaluate_golden([]);
        assert r['negative_matches'] == 0;
        print(f'Golden: {len(g)} items, evaluator ok')
        "
      - run: python -c "
        from evidence_agent.database.migrations import check;
        r = check();
        assert r['integrity'] == 'ok';
        assert r['version'] >= 5;
        print(f'DB check OK: version={r[\"version\"]}')
        "
